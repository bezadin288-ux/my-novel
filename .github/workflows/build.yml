name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Download and setup Ren'Py
        run: |
          wget -q https://www.renpy.org/dl/8.2.1/renpy-8.2.1-sdk.tar.bz2
          tar -xf renpy-8.2.1-sdk.tar.bz2
          mv renpy-8.2.1-sdk renpy
      - name: Unzip project
        run: |
          unzip -qo my_novel.zip
          echo "Содержимое после распаковки:"
          ls -la
      - name: Build APK
        run: |
          ./renpy/renpy.sh ./my_novel distribute --package android
          mkdir -p output
          find my_novel -name "*.apk" -exec cp {} output/ \;
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-novel-apk
          path: output/
